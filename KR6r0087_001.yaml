body:
  text: 明古杭雲棲寺沙門袾宏輯錄雙童現瑞晉佛度跋陀羅初於道場寺譯經堂前池中每二青衣童子從池中出捧以香花舉眾皆見以此經久在龍宮龍王慶感傳通故為給侍天地呈祥唐實叉難陀於證聖元年三月十四日辛酉重譯預於庚申日天后夢徧天之內皆降甘露後一日壬戌復降甘雨新經初譯勅令藏和尚開講十二月十二日講至華藏世界海震動之文講堂內及寺院中忽然震動於時道俗數千共覩歎未曾有地震光流西域記云世親菩薩初以小乘為業兄無著託病而召世親因開大教謂云及吾未死之前讀吾所習經典世親即讀華嚴乃見毗盧法界普賢行海因生信悟歎曰可取利劒斷吾舌根用明己讚小乘之失兄止之曰如人因地而倒亦因地起昔日以舌毀於大乘今可將舌以讚大乘遂入山披覧大乘造十地論論成之日大地徧震光明洞然感通玄悟北齊太和中第三王子於清涼山求文殊師利菩薩焚身供養隨侍中官劉謙之覩焚身之事奏乞入山修道遂齎此經晝夜精勤禮懺讀誦心祈妙悟絕粒飲水垂三七日形氣雖微丹懇彌勁忽感髯髭盡生復丈夫相神彩通悟洞曉幽旨造此經論共六百卷又後魏靈辨者宿植勝善及見華嚴偏加鑽仰乃頂戴此經入清涼山乞文殊潛護凡歷一歲足破血流肉盡骨穿忽聞空中謂曰汝止之但思惟此經於是披卷豁然大悟造華嚴演義釋文一百卷經輝五彩後魏安豐王延明中山王元熙並處心無上稽首圓宗嘗以香和墨寫華嚴經一百部金字經一部皆五香為藏七寶為函靜夜良辰清齋行道即放神光五色爛然照耀臺宇神人警衛僧德圓常以華嚴為業修一淨園樹諸穀楮并種香草雜以鮮花每一入園必加洗濯身著淨衣溉以香水楮生三載香氣四達後以寫經纔書數行每字放光照明院宇有神人執戟現形警衛又有青衣梵童手執天花忽申供養天女給侍唐李長者諱通玄初至太原寓高山奴家每旦唯食棗十顆柏葉餅一枚後捨去路逢一虎當途馴伏如有所待長者語言吾將著論釋華嚴經汝當為吾擇一棲止虎負長者囊鉢行三十餘里至一土龕便自蹲住長者入龕龕素無水是夕風雷拔一老松松下出泉清冽甘美長者造論時有二女容華絕世汲水焚香供給紙筆卯辰之際輒具淨饌莫知去來著論將終便爾絕迹冬葵發𧰟唐鄧元爽華陰人證聖中有親故暴卒七日復甦云冥中欲追爽爽懼或教寫華嚴經寫竟爽母墓側先有蜀葵至冬已瘁忽花發燦然榮茂鄉閭異之聞於朝旌為孝門瑞鳥銜花僧法誠隱居藍谷後於南嶺造華嚴堂圖七處九會之像專精供養後感瑞鳥形色非常銜花入室旋遶供養神人延請隋禪定道場僧慧悟京兆人嘗與一僧同隱終南悟受華嚴彼持涅槃木食巖棲各專其業忽一人來請就宅赴齋二僧相推人云請華嚴法師悟因隨往乃山神也請千羅漢皆推悟上座食訖既去神呼一童子令侍乃入師口中遂得仙還歸取經辭其友人渺然履空而去普賢授義僧辨才不知何許人幼事裕法師以華嚴為業久而不悟乃別護淨造香函盛經頂戴行道凡經三載夢普賢指授玄義忽爾成誦煥若臨鏡口獲舍利唐樊玄智安定人弱歲歸依杜順和尚順令誦華嚴為業仍依此經修普賢行每誦經口中頻獲舍利前後數百粒菩薩涌現唐崇福寺僧慧祐戒行精苦事儼和尚專業華嚴清晨良宵焚香虔誠誦出現品忽見十餘菩薩從地涌出現身金色皆放光明坐蓮華座合掌聽誦經訖便隱脩羅退陣于闐國沙彌般若彌伽薄堅持戒行專誦華嚴忽有人合掌謂言諸天請師願師閉目俄至天上天主跪而請曰今方與脩羅戰屢被摧衄屈師誦華嚴經望法力加被師乘天輅心念華嚴以諸天眾對彼勍敵脩羅見之忽然潰散須臾送歸身染天香終身不滅證入無生解脫和尚姓邢氏代州五臺縣人七歲出家初從慧超禪師超器之後於五臺專誦華嚴依經作觀求見文殊文殊現身誨云汝今不須禮覲於我應自悔責必當大悟因反求乃悟無生感諸佛現為說偈曰諸佛寂滅甚深法曠劫修行今乃得若能開曉此法眼一切諸佛皆隨喜解脫問寂滅之法若為可說得教人耶諸佛即隱復有聲告曰方便智為燈照見心境界欲空真實法一切無所見又在路思欲焚香空中聲曰合掌以為花身為供養具善心真實香讚歎香煙布諸佛聞此香尋聲來相度眾等勤精進終不相疑誤故謂偈讚排空也時雨霶流僧道英姓陳氏蒲縣人年十八親為之娶五載同居誓不相觸後從并縣炬法師聽華嚴經便落髮入太行山柏梯寺修行止觀屬亢旱講華嚴經以祈甘澤有二老翁各二童侍時來聽講英異而問之乃知海神因曰今為檀越請下微雨翁勅二童童即從窗孔中出須臾大雨霶霈遠近咸賴焉華藏受生隋靈幹狄道人依衍法師出家十八能講華嚴常依經作華藏觀及彌勒天宮觀至疾革目上視若有所見僧童真問之答曰尚見青衣童子引至兜率而天樂非久終墜輪迴蓮華藏是所願也言已氣盡須臾復甦真又問今何所見答曰見大水徧滿華如車輪而坐其上吾願足矣神授華音宋求那跋陀羅中天竺人探匣取經即得華嚴後譙王請講以未通華言因禮懺虔請觀音以祈冥應遂夢神人執劒持一人首而為易之豁然便覺備悟華言遂講大經累數十徧天宮請講魏勒那摩提中天竺人博文贍學明悟禪理初至洛陽譯十地論帝每令講華嚴精義頴發嘗處高座忽有持笏執柬者形如尊官云天帝來請法師講華嚴經都講維那咸亦須之講席眾僧一時同見師熈怡微笑告眾辭訣卒於法座其都講等同時入滅洪水斷流杜順和尚姓杜氏諱法順京兆杜陵人也以華嚴為業嘗居山將種葵地多蟲蟻師乃巡疆定封蟲俱外徙三原縣民從生聾啞師乃召之與語應言即愈因詣南山值橫渠漲溢止之斷流徐步而過將終之日普會有緣聲色不渝言終而逝靈應非一別傳云是文殊化身神光屢現唐法藏字賢首母夢異光而孕後遇儼法師於雲花寺講華嚴經師乃往詣中夜見有神光來燭庭宇師歎曰當有異人發弘大教及明遇儼和尚自是服膺深入無盡又後於雲花寺開講有光明現從口出須臾成葢眾所知見地獄消滅纂靈記云京兆人王明幹素不修善因患暴死將入地獄見一僧教之偈云若人欲了知三世一切佛應當如是觀心造諸如來誦此偈者能排地獄諸苦其人誦已乃入見王王遂放免當誦偈時聲所至處受苦之人皆得解脫此晉經文與今唐經下二句稍別盥水濟生僧伽彌多羅師子國人證第三果麟德初來震旦高宗甚加敬重後往清涼敬禮文殊至西太原寺時屬諸僧誦華嚴經問是何經答曰華嚴肅然改容曰不知此地亦有是經合掌讚歎曰此大方廣功德難思西國相傳有讀此經以水盥掌水霑蟲蟻其捨命者皆得生天景雲現瑞唐清涼國師諱澄觀字大休會稽人姓夏侯氏生於玄宗開元戊寅身長九尺四寸垂手過膝口四十齒目光夜發晝乃不瞬德宗建中二年下筆著疏先求瑞應一夕夢金容山峙光相瑩然既覺知是光明徧照之徵自是筆無停思歷四年而文成又夢化身為龍矯首南臺尾矯北臺宛轉淩虗須臾變百千數蜿蜒青冥分散四方而去識者以為流通之像初為眾講感景雲凝空盤旋成葢疏鈔之外復撰手鏡一百卷綱要三卷正要一卷玄鏡一卷鏡燈說文一卷三聖圓融觀一卷七處九會圖心說文一卷勅有司鑄印遷國師號清涼開成三年三月六日示寂生歷九朝為七帝門師春秋一百有二僧臘八十有三全身塔終南山未幾有梵僧至闕表稱於𦵇嶺見二使者淩空而過以呪止而問之答曰北印度文殊堂神也東取華嚴菩薩大牙歸國供養有旨啟塔果失一牙惟三十九存焉遂闍維舍利光明瑩潤舌如紅蓮仍諡號清涼國師之塔異僧授旨唐法空隋末鴈門郎將也棄家詣清涼深谷常誦華嚴唯心作佛之偈後遇異僧授以般若玄旨豁爾心空臨終坐逝山神聽經曹城慧靈丘李氏子其親禱於五臺山而生既長辭親詣五臺真容院從法順和尚披剃嘗誦華嚴於李牛谷草木為食每誦經時有五七儒服者坐聽數持異花鮮菓以獻師怪而問之答曰某山神也蒙師法力無以為報願充執侍師不樂遂捨其處金城輝暎金蘇陀室利中印度那蘭陀寺僧誦持華嚴年八十五航海來禮五臺每一臺頂誦華嚴十部禪寂七日定中見金城紺殿寶蓮香水珠網交輝諸天童子遊戲其中後於靈鷲峯化去得舍利八合璀蘭如珠龍光五彩元華嚴菩薩諱正順尉州高氏子從五臺壽寧用公祝髮結廬深樹唯閱華嚴數盈千部每入華藏觀三五日方起世號華嚴菩薩將示寂門人乞偈師曰歷劫本無去住應用何思何慮轉身踏破虗空一切是非莫顧言訖而逝是日靈几上現龍五彩飛光燭於庭宇附華嚴大經處會品目卷帙總要之圖
